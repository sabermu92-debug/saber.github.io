 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>شركة بس سكشن الهندسية المحدودة</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <style>
    :root {
      --dark-blue: #0a1931;
      --gold: #ffc93c;
      --white: #ffffff;
      --fb-blue: #1877F2;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      /* الخلفية صورة الكتاب */
      background: url('1775694529748.jpg') no-repeat center center fixed;
      background-size: cover;
    }

    /* طبقة الحماية للنص */
    .overlay {
      background: rgba(255, 255, 255, 0.9);
      min-height: 100vh;
    }

    .hero {
      padding: 60px 20px;
      text-align: center;
    }

    .logo-box {
      background: white;
      padding: 10px;
      border-radius: 50%;
      display: inline-block;
      border: 3px solid var(--gold);
      margin-bottom: 15px;
    }

    .logo-box img { width: 100px; height: 100px; object-fit: contain; }

    .section { padding: 40px 10%; text-align: center; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .contact-form {
      max-width: 500px;
      margin: 20px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    .submit-btn {
      background: var(--dark-blue);
      color: white;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    /* أيقونة الواتساب */
    .whatsapp-float {
      position: fixed;
      bottom: 30px;
      left: 30px;
      background: #25d366;
      color: white;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      z-index: 1000;
      text-decoration: none;
    }

    /* الفوتر والأيقونات الاجتماعية */
    footer {
      background: var(--dark-blue);
      color: white;
      padding: 30px;
      text-align: center;
      margin-top: 50px;
    }

    .social-links { margin-bottom: 15px; }
    .social-links a {
      color: white;
      font-size: 35px;
      margin: 0 15px;
      transition: 0.3s;
      text-decoration: none;
    }
    .social-links .fa-facebook:hover { color: var(--fb-blue); }
    .social-links .fa-whatsapp:hover { color: #25d366; }

  </style>
</head>
<body>

<div class="overlay">
  <div class="hero">
    <div class="logo-box">
      <img src="https://image.api.uizard.io/api/cdn/2/ae4817a0-9c2b-4566-b48f-3652875f5231.png" alt="Logo">
    </div>
    <h1 style="color: var(--dark-blue);">شركة بس سكشن الهندسية</h1>
    <p style="color: #b71c1c; font-weight: bold;">تخصصنا: تركيب المحولات وتصميم اللوحات الكهربائية</p>
  </div>

  <div class="section">
    <div class="grid">
      <div class="card">
        <i class="fas fa-bolt" style="font-size: 30px; color: var(--dark-blue);"></i>
        <h3>المحولات</h3>
      </div>
      <div class="card">
        <i class="fas fa-microchip" style="font-size: 30px; color: var(--dark-blue);"></i>
        <h3>اللوحات</h3>
      </div>
    </div>
  </div>

  <div class="section" id="contact">
    <div class="contact-form">
      <h3>تواصل معنا</h3>
      <form action="https://formspree.io/f/mqaeavqj" method="POST">
        <input type="text" name="name" placeholder="الاسم" required>
        <input type="email" name="email" placeholder="الإيميل" required>
        <textarea name="message" rows="4" placeholder="رسالتك..."></textarea>
        <input type="hidden" name="_to" value="Bussectioneng2021@gmail.com">
        <button type="submit" class="submit-btn">إرسال</button>
      </form>
    </div>
  </div>

  <a href="https://wa.me/249912724809" class="whatsapp-float">
    <i class="fab fa-whatsapp"></i>
  </a>

  <footer>
    <div class="social-links">
      <a href="Https://www.facebook.com/wsl.tal2018" target="_blank" title="تابعنا على فيسبوك">
        <i class="fab fa-facebook"></i>
      </a>
      <a href="https://wa.me/249912724809" target="_blank" title="راسلنا على واتساب">
        <i class="fab fa-whatsapp"></i>
      </a>
    </div>
    <p>© 2026 شركة بس سكشن الهندسية المحدودة</p>
    <p style="font-size: 12px; opacity: 0.7;">الخرطوم - السودان</p>
  </footer>
</div>

</body>
</html>
