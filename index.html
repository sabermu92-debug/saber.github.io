 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>شركة بس سكشن الهندسية المحدودة | ريادة كهربائية</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    /* تعريف المتغيرات للوحة الألوان الملكية */
    :root {
      --primary-dark: #0a1931; /* أزرق داكن ملكي */
      --primary-light: #185adb; /* أزرق زاهي للمسة عصرية */
      --accent-gold: #ffc93c; /* ذهبي غني للاحترافية */
      --text-main: #2c3e50; /* لون نص داكن مريح */
      --text-light: #ecf0f1; /* لون نص فاتح */
      --bg-light: #f4f7f6; /* خلفية فاتحة جداً */
      --white: #ffffff;
      --transition: all 0.4s ease-in-out; /* حركة سلسة موحدة */
    }

    /* تنسيقات أساسية للخطوط والهيكل */
    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      background-color: var(--bg-light);
      color: var(--text-main);
      line-height: 1.8;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    h1, h2, h3 { font-weight: 700; margin-top: 0; }

    /* القائمة العلوية الشفافة (تصبح بيضاء عند التمرير) */
    nav {
      background-color: rgba(255, 255, 255, 0.95);
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      box-shadow: 0 2px 20px rgba(0,0,0,0.05);
      transition: var(--transition);
    }

    nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      max-width: 1200px;
      margin: 0 auto;
    }

    nav a {
      color: var(--primary-dark);
      padding: 20px 25px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.1rem;
      display: block;
      transition: var(--transition);
      position: relative;
    }

    /* تأثير الخط السفلي عند التأشير */
    nav a::after {
      content: '';
      position: absolute;
      width: 0;
      height: 3px;
      background: var(--accent-gold);
      bottom: 15px;
      right: 25px;
      transition: var(--transition);
    }

    nav a:hover { color: var(--primary-light); }
    nav a:hover::after { width: calc(100% - 50px); }

    /* القسم البطولي (Hero Section) - واجهة ملء الشاشة */
    .hero {
      background: linear-gradient(135deg, var(--primary-dark) 0%, #102a43 100%);
      color: var(--text-light);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 20px;
      position: relative;
      overflow: hidden;
    }

    /* خلفية هندسية متحركة خفيفة */
    .hero::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: url('https://www.transparenttextures.com/patterns/p4.png'); /* نمط هندسي خفيف */
      opacity: 0.1;
    }

    .hero-content { max-width: 800px; z-index: 10; position: relative; }

    .hero .logo-container {
      background-color: var(--white);
      width: 150px;
      height: 150px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      border: 5px solid var(--accent-gold);
      transition: var(--transition);
    }

    .hero .logo-container img {
      max-width: 80%;
      max-height: 80%;
      border-radius: 50%;
    }

    .hero h1 { font-size: 3.5rem; margin-bottom: 15px; letter-spacing: -1px; }
    .hero p { font-size: 1.5rem; opacity: 0.9; margin-bottom: 40px; }

    /* أزرار الدعوة لاتخاذ إجراء (CTA Buttons) */
    .btn {
      display: inline-block;
      padding: 15px 40px;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1.1rem;
      transition: var(--transition);
      margin: 0 10px;
    }

    .btn-gold {
      background-color: var(--accent-gold);
      color: var(--primary-dark);
      box-shadow: 0 4px 15px rgba(255, 201, 60, 0.4);
    }

    .btn-gold:hover {
      background-color: var(--white);
      transform: translateY(-5px);
    }

    .btn-outline {
      border: 2px solid var(--white);
      color: var(--white);
    }

    .btn-outline:hover {
      background-color: var(--white);
      color: var(--primary-dark);
      transform: translateY(-5px);
    }

    /* الأقسام العامة */
    section {
      padding: 100px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-title {
      text-align: center;
      margin-bottom: 80px;
      position: relative;
    }

    .section-title h2 {
      font-size: 2.8rem;
      color: var(--primary-dark);
      margin-bottom: 10px;
      position: relative;
      display: inline-block;
    }

    /* خط زخرفي تحت العنوان */
    .section-title h2::after {
      content: '';
      position: absolute;
      width: 100px;
      height: 5px;
      background-color: var(--accent-gold);
      bottom: -15px;
      right: 50%;
      transform: translateX(50%);
      border-radius: 5px;
    }

    /* لماذا نحن؟ (تخطيط شبكي مبتكر) */
    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 40px;
    }

    .feature-item {
      background-color: var(--white);
      padding: 50px;
      border-radius: 20px;
      box-shadow: 0 5px 25px rgba(0,0,0,0.03);
      transition: var(--transition);
      border: 1px solid #eee;
    }

    .feature-item:hover {
      transform: translateY(-10px) scale(1.02);
      box-shadow: 0 15px 40px rgba(0,0,0,0.1);
      border-color: var(--accent-gold);
    }

    .feature-item i {
      font-size: 50px;
      color: var(--accent-gold);
      margin-bottom: 30px;
      display: inline-block;
      background-color: #fff9e6; /* خلفية صفراء فاتحة جداً للأيقونة */
      padding: 20px;
      border-radius: 50%;
    }

    .feature-item h3 { color: var(--primary-dark); font-size: 1.6rem; }

    /* تخصصاتنا (تأثير الزجاج الشفاف - Glassmorphism) */
    #services {
      background-image: url('https://images.unsplash.com/photo-1517420784541-6927976e100d?q=80&w=1600&auto=format&fit=crop'); /* خلفية هندسية هندسية */
      background-attachment: fixed; /* تأثير البارالاكس */
      background-size: cover;
      color: var(--text-light);
      position: relative;
    }

    #services::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(10, 25, 49, 0.9); /* طبقة داكنة فوق الخلفية */
    }

    #services .section-title h2 { color: var(--text-light); }
    #services .section-title h2::after { background-color: var(--accent-gold); }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 40px;
      position: relative;
      z-index: 10;
    }

    .service-card {
      background: rgba(255, 255, 255, 0.1); /* تأثير الزجاج */
      backdrop-filter: blur(10px); /* بلور */
      padding: 60px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: var(--transition);
    }

    .service-card:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: var(--accent-gold);
      transform: translateY(-5px);
    }

    .service-card i {
      font-size: 60px;
      color: var(--accent-gold);
      margin-bottom: 30px;
    }

    .service-card h3 { font-size: 1.8rem; margin-bottom: 15px; }
    .service-card p { opacity: 0.9; font-size: 1.1rem; }

    /* التواصل (نموذج عصري وأنيق) */
    #contact { background-color: var(--white); }

    .contact-wrapper {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 50px;
      background-color: var(--bg-light);
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.05);
    }

    .contact-info {
      background-color: var(--primary-dark);
      color: var(--text-light);
      padding: 60px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .contact-info h3 { font-size: 2rem; margin-bottom: 30px; color: var(--accent-gold); }
    .contact-info-item { display: flex; align-items: center; margin-bottom: 25px; font-size: 1.1rem; }
    .contact-info-item i { color: var(--accent-gold); margin-left: 15px; font-size: 1.3rem; width: 30px; text-align: center; }

    .contact-form-container { padding: 60px; }
    .contact-form { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }

    input, textarea {
      width: 100%;
      padding: 18px;
      border: 1px solid #ddd;
      border-radius: 12px;
      box-sizing: border-box;
      font-family: inherit;
      font-size: 1.1rem;
      transition: var(--transition);
      background-color: var(--white);
    }

    input:focus, textarea:focus {
      border-color: var(--primary-light);
      box-shadow: 0 0 10px rgba(24, 90, 219, 0.1);
      outline: none;
    }

    textarea { grid-column: span 2; }

    .submit-btn {
      grid-column: span 2;
      padding: 18px;
      background-color: var(--primary-dark);
      color: var(--white);
      border: none;
      border-radius: 12px;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .submit-btn:hover { background-color: var(--accent-gold); color: var(--primary-dark); transform: translateY(-3px); }

    /* الواتساب والفوتر */
    .whatsapp {
      position: fixed;
      bottom: 40px;
      left: 40px;
      background-color: #25D366;
      color: white;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 35px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
      z-index: 1000;
      text-decoration: none;
      transition: var(--transition);
    }

    .whatsapp:hover { transform: scale(1.1) rotate(10deg); }

    footer {
      background-color: var(--primary-dark);
      color: var(--text-light);
      text-align: center;
      padding: 60px 20px;
    }

    footer p { margin: 5px 0; font-size: 1.1rem; opacity: 0.8; }
    .social-links { margin-top: 30px; }
    .social-links a {
      color: var(--white);
      font-size: 30px;
      margin: 0 20px;
      text-decoration: none;
      transition: var(--transition);
      display: inline-block;
    }

    .social-links a:hover { color: var(--accent-gold); transform: scale(1.2); }

    /* الاستجابة للهواتف */
    @media (max-width: 992px) {
      .contact-wrapper { grid-template-columns: 1fr; }
      .contact-info { padding: 40px; order: 2; }
      .hero h1 { font-size: 2.8rem; }
      nav ul { flex-direction: column; }
    }
  </style>
</head>
